<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Contact — Drop Mike a note at MiLu</title>
<meta name="description" content="Get in touch with MiLu. Send Mike a message about the games, press inquiries, or anything else. Replies usually within a few days.">
<link rel="canonical" href="https://milu.company/contact/">

<meta property="og:type" content="website">
<meta property="og:title" content="Contact — MiLu">
<meta property="og:description" content="Drop me a note.">
<meta property="og:url" content="https://milu.company/contact/">
<meta property="og:site_name" content="MiLu">
<meta name="twitter:card" content="summary">

<meta name="theme-color" content="#f3e8d3" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#1a1410" media="(prefers-color-scheme: dark)">

<link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..700;1,9..144,400..700&family=Newsreader:ital,opsz,wght@0,6..72,400..700;1,6..72,400..700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/style.css">

<!-- Cloudflare Turnstile widget. Replace data-sitekey on the widget div
     below with a real key from dash.cloudflare.com/?to=/:account/turnstile.
     Current value is Cloudflare's "always passes" test key. -->
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>

<style>
  /* Form styling tuned to the warm-paper aesthetic */
  .form-card {
    background: var(--paper-card);
    border: 1px solid var(--ink-rule);
    border-radius: 6px;
    padding: clamp(24px, 4vw, 40px);
    box-shadow: 0 2px 0 var(--paper-shade), 0 22px 44px -20px rgba(34, 25, 17, 0.35);
    margin-top: 32px;
  }
  .field {
    display: block;
    margin-bottom: 22px;
  }
  .field label {
    display: block;
    font-family: var(--display);
    font-size: 0.72rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ember-deep);
    font-weight: 600;
    margin-bottom: 8px;
  }
  .field .req {
    color: var(--rust);
    margin-left: 4px;
  }
  .field input,
  .field textarea {
    width: 100%;
    font-family: var(--body);
    font-size: 1.05rem;
    line-height: 1.5;
    color: var(--ink);
    background: var(--paper-soft);
    border: 1px solid var(--ink-rule);
    border-radius: 4px;
    padding: 12px 14px;
    transition: border-color 180ms ease, background 180ms ease;
  }
  .field input:focus,
  .field textarea:focus {
    outline: none;
    border-color: var(--ember);
    background: var(--paper-card);
    box-shadow: 0 0 0 3px rgba(200, 112, 60, 0.15);
  }
  .field textarea {
    min-height: 160px;
    resize: vertical;
    font-family: var(--body);
  }
  /* Honeypot — visually hidden but reachable to bots */
  .honeypot {
    position: absolute;
    left: -9999px;
    width: 1px;
    height: 1px;
    overflow: hidden;
  }
  .form-actions {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
    margin-top: 12px;
  }
  .form-actions .fine {
    font-size: 0.85rem;
    color: var(--ink-faint);
  }
  .btn[type="submit"] {
    border: 1px solid var(--ink);
    cursor: pointer;
    font-family: var(--display);
    font-style: italic;
    font-size: 1rem;
    font-weight: 500;
  }
  .submit-status {
    margin-top: 20px;
    padding: 14px 16px;
    border-radius: 4px;
    font-family: var(--display);
    font-style: italic;
    font-size: 0.95rem;
    display: none;
  }
  .submit-status.ok {
    background: rgba(90, 138, 94, 0.12);
    border: 1px solid var(--ivy);
    color: var(--ivy);
    display: block;
  }
  .submit-status.error {
    background: rgba(181, 55, 55, 0.1);
    border: 1px solid var(--rust);
    color: var(--rust);
    display: block;
  }
  /* Turnstile widget sits between the message and the submit button */
  .turnstile-row {
    margin-bottom: 18px;
    min-height: 65px;
    display: flex;
    justify-content: flex-end;
  }
  /* Disable the submit button until Turnstile has produced a token */
  button[type="submit"]:disabled {
    opacity: 0.55;
    cursor: not-allowed;
    transform: none !important;
  }
</style>
</head>
<body>

<a href="#main" class="skip">Skip to content</a>

<header class="site-header">
  <div class="wrap">
    <a class="wordmark" href="/" aria-label="MiLu — home">MiLu<span class="dot" aria-hidden="true"></span></a>
    <nav class="nav" aria-label="Primary">
      <a href="/#games">Games</a>
      <a href="/about/">About</a>
      <a href="/press/">Press</a>
      <a href="/contact/" aria-current="page">Contact</a>
    </nav>
  </div>
</header>

<main id="main">
  <article class="detail">
    <div class="wrap-narrow" style="padding-top: 24px;">

      <p class="eyebrow solo fade fade-1">Contact</p>
      <h1 class="fade fade-2" style="font-style: italic; margin: 18px 0 18px;">Drop me a note.</h1>
      <p class="lede fade fade-3">
        Write about the games, press, collaboration, or just say hi. I read everything personally.
        Replies usually come within a few days.
      </p>

      <!--
        Posts to an AWS API Gateway HTTP API in eu-central-1 that proxies to
        the milu-contact-form Lambda. The Lambda validates the fields and
        sends the message via SES to the address in its RECIPIENT env var
        (currently mike@milu.company). CORS is locked to milu.company and
        the local preview at localhost:8772.
      -->
      <form class="form-card fade fade-3"
            action="https://c4wht2v8pe.execute-api.eu-central-1.amazonaws.com/"
            method="POST"
            id="contact-form">

        <label class="field">
          <span>Your name <span class="req" aria-hidden="true">*</span></span>
          <input type="text" name="name" required autocomplete="name" placeholder="What should I call you?">
        </label>

        <label class="field">
          <span>Your email <span class="req" aria-hidden="true">*</span></span>
          <input type="email" name="email" required autocomplete="email" placeholder="So I can reply">
        </label>

        <label class="field">
          <span>Subject</span>
          <input type="text" name="subject" placeholder="(optional)">
        </label>

        <label class="field">
          <span>Message <span class="req" aria-hidden="true">*</span></span>
          <textarea name="message" required placeholder="What's on your mind?"></textarea>
        </label>

        <!-- Honeypot — bots will fill this, real users won't see it -->
        <label class="honeypot" aria-hidden="true">
          Don't fill this out if you're human: <input type="text" name="_gotcha" tabindex="-1" autocomplete="off">
        </label>

        <!-- Cloudflare Turnstile widget. Site key below is Cloudflare's public
             "always passes" test key. Swap for a real one once provisioned. -->
        <div class="turnstile-row">
          <div class="cf-turnstile"
               data-sitekey="1x00000000000000000000AA"
               data-theme="auto"
               data-callback="onTurnstileSuccess"
               data-error-callback="onTurnstileError"
               data-expired-callback="onTurnstileExpired"></div>
        </div>

        <div class="form-actions" style="justify-content: flex-end;">
          <button type="submit" id="submit-btn" class="btn" disabled>Send <span class="arrow">→</span></button>
        </div>

        <div id="submit-status" class="submit-status" role="status" aria-live="polite"></div>
      </form>

    </div>
  </article>
</main>

<footer class="site-footer">
  <div class="wrap">
    <p class="credit">© 2026 MiLu · By Mike Lundstrom, for the love of making games.</p>
    <p class="ornament">— fin —</p>
  </div>
</footer>

<script>
  // Turnstile callbacks: keep the submit button disabled until we have a token.
  // Defined at window scope because the Turnstile script calls them by name.
  window.onTurnstileSuccess = function () {
    var btn = document.getElementById('submit-btn');
    if (btn) btn.disabled = false;
  };
  window.onTurnstileError = function () {
    var btn = document.getElementById('submit-btn');
    if (btn) btn.disabled = true;
  };
  window.onTurnstileExpired = window.onTurnstileError;

  // Progressive enhancement: submit via fetch so we can show inline success/error
  // without a full-page redirect.
  (function () {
    const form = document.getElementById('contact-form');
    const statusEl = document.getElementById('submit-status');
    if (!form) return;

    form.addEventListener('submit', async function (e) {
      e.preventDefault();
      statusEl.className = 'submit-status';
      statusEl.textContent = '';

      const submitBtn = form.querySelector('button[type="submit"]');
      const originalLabel = submitBtn.innerHTML;
      submitBtn.disabled = true;
      submitBtn.innerHTML = 'Sending…';

      try {
        // Send as URL-encoded form data. The Lambda accepts both this and JSON.
        const body = new URLSearchParams();
        new FormData(form).forEach(function (value, key) { body.append(key, value); });

        const res = await fetch(form.action, {
          method: 'POST',
          body: body,
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
        });
        const data = await res.json().catch(function () { return {}; });
        if (res.ok && data.ok) {
          statusEl.className = 'submit-status ok';
          statusEl.textContent = 'Thanks. Message sent. I’ll get back to you soon.';
          form.reset();
          // Reset Turnstile so a fresh challenge gates the next submission.
          if (window.turnstile) { try { window.turnstile.reset(); } catch (e) {} }
        } else {
          statusEl.className = 'submit-status error';
          statusEl.textContent = (data && data.error) || 'Something went wrong. Please try again in a moment.';
          if (window.turnstile) { try { window.turnstile.reset(); } catch (e) {} }
        }
      } catch (err) {
        statusEl.className = 'submit-status error';
        statusEl.textContent = 'Could not reach the server. Please try again in a moment.';
        if (window.turnstile) { try { window.turnstile.reset(); } catch (e) {} }
      } finally {
        // Button label restored; stays disabled until Turnstile produces a new token.
        submitBtn.innerHTML = originalLabel;
        submitBtn.disabled = true;
      }
    });
  })();
</script>

</body>
</html>
